# VERA Risk Narrative Rules
# Used by RiskNarrativeEngine (B2)

long_horizon:
  states:
    D0_SAFE:
      when: {d_states: ["D0", "D4"]}
      text: "长周期处于结构性安全区。虽然可能存在短期波动，但下方历史支撑极强，适合长线布局。"
    D1_BUBBLE:
      when: {d_states: ["D1"]}
      text: "当前处于长周期扩张末端，历史溢价过高，需警惕长期均值回归的风险。"
    D3_DISCOVERY:
      when: {d_states: ["D3", "D5"]}
      text: "长周期结构已破坏，正处于极其不稳定的‘价格发现’或‘下行寻找底部’阶段。"
    DEFAULT:
      text: "长周期处于均值博弈区，缺乏极端的确定性机会。"

short_window:
  regimes:
    CRASH:
      when: {min_1y_dd: 0.15, max_speed: 10}
      text: "短期表现为‘暴跌’模式。抛压极度集中，流动性溢价可能暂时失效。"
    CORRECTION:
      when: {min_1y_dd: 0.05, max_speed: 30}
      text: "短期处于常态化回调。属于技术性结构修正，需关注止跌信号。"
    SIDEWAYS:
      when: {max_1y_dd: 0.05}
      text: "短期横盘整理。交投清淡或处于等待重大消息窗口，缺乏明确动量。"

valuation_overlay:
  CHEAP: "当前估值位于历史极端低位（分位 < 25%），安全垫极厚。"
  NEUTRAL: "当前估值处于历史中枢附近，定价相对公允。"
  EXPENSIVE: "当前估值明显偏高（分位 > 75%），需防范杀估值风险。"

price_structure:
  US_REVERSAL:
    title: "反转确认（价格结构维度）"
    body: >
      价格已突破关键阻力位或均线压制，底部形态基本确立，
      在【价格路径】这一维度上，空头阶段告一段落，进入右侧交易区间。
      是否加仓仍需结合估值、水位与整体风险信号综合判断。
  US_TREND_DOWN:
    title: "趋势性下跌（价格结构维度）"
    body: >
      价格处于持续下跌通道中，暂未出现有效的反转信号，
      不宜仅凭短期反弹信号进行逆势加仓。

templates:
  default:
    intro: "【VERA 风险解读】"
    sections_order: ["long", "short", "val"]
    outro: "（注：以上解读基于量化模型，不作为直接买卖建议。）"
